<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techniques de Bartending</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: #14110F;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    overflow: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 150px 150px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial gold glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(201,162,39,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header .label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #C9A227;
    border: 1px solid rgba(201,162,39,0.4);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .header h1 span {
    color: #C9A227;
  }

  /* Navigation dots */
  .nav {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(201,162,39,0.25);
    border: 1px solid rgba(201,162,39,0.4);
    cursor: pointer;
    transition: all 0.3s;
  }

  .dot.active {
    background: #C9A227;
    box-shadow: 0 0 8px rgba(201,162,39,0.6);
    transform: scale(1.2);
  }

  /* Card container (3D flip) */
  .card-area {
    perspective: 1200px;
    height: 280px;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Front */
  .card-front {
    background: linear-gradient(135deg, #1e1a17 0%, #14110F 60%, #1a1510 100%);
    border: 1px solid rgba(201,162,39,0.35);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,162,39,0.1);
  }

  .card-front .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #C9A227;
    margin-bottom: 12px;
  }

  .card-front .card-title {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
    line-height: 1.1;
  }

  .card-front .card-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .flip-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: rgba(201,162,39,0.6);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .flip-hint::before {
    content: '↺';
    font-size: 16px;
    color: #C9A227;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    0%,80%,100% { transform: rotate(0deg); }
    40% { transform: rotate(360deg); }
  }

  .card-front .card-icon {
    position: absolute;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 72px;
    opacity: 0.08;
    pointer-events: none;
  }

  /* Gold bar accent */
  .card-front::before {
    content: '';
    position: absolute;
    left: 0;
    top: 20%;
    bottom: 20%;
    width: 3px;
    background: linear-gradient(180deg, transparent, #C9A227, transparent);
    border-radius: 0 2px 2px 0;
  }

  /* Back */
  .card-back {
    background: linear-gradient(135deg, #C9A227 0%, #a8841e 50%, #8a6b18 100%);
    transform: rotateY(180deg);
    color: #14110F;
  }

  .card-back .back-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(20,17,15,0.55);
    margin-bottom: 14px;
  }

  .card-back ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .card-back ul li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #14110F;
    line-height: 1.4;
  }

  .card-back ul li::before {
    content: '▸';
    color: rgba(20,17,15,0.5);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-back .keyword {
    font-weight: 700;
  }

  /* Controls */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-prev {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .btn-prev:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  .btn-next {
    background: #C9A227;
    color: #14110F;
  }

  .btn-next:hover {
    background: #E3C766;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(201,162,39,0.4);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .counter {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .counter strong {
    color: #C9A227;
  }

  /* Slide in animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .card.anim-right { animation: slideIn 0.35s ease forwards; }
  .card.anim-left  { animation: slideInLeft 0.35s ease forwards; }
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="label">CS Métiers du Bar — M6</div>
    <h1>Techniques de <span>Bartending</span></h1>
  </div>

  <div class="nav" id="nav"></div>

  <div class="card-area">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front" id="front">
        <div class="card-icon" id="icon"></div>
        <div class="card-tag" id="tag"></div>
        <div class="card-title" id="title"></div>
        <div class="card-subtitle" id="subtitle"></div>
        <div class="flip-hint">Cliquer pour découvrir</div>
      </div>
      <div class="card-face card-back" id="back">
        <div class="back-label">Caractéristiques clés</div>
        <ul id="points"></ul>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-prev" id="prevBtn" onclick="navigate(-1)">← Précédent</button>
    <span class="counter"><strong id="cur">1</strong> / <span id="total"></span></span>
    <button class="btn btn-next" id="nextBtn" onclick="navigate(1)">Suivant →</button>
  </div>

</div>

<script>
const cards = [
  {
    tag: "Technique 01",
    icon: "🥃",
    title: "Cuban Roll",
    subtitle: "Transvaser un cocktail entre deux timbales pour aérer sans glaçons.",
    points: [
      "<span class='keyword'>Objectif :</span> Aérer, homogénéiser, développer les arômes sans dilution",
      "<span class='keyword'>Méthode :</span> 6 à 8 passages avec passoire à glaçons",
      "<span class='keyword'>Usage :</span> Cocktails à base d'A.B.V. ou Bloody Mary",
      "<span class='keyword'>Niveau :</span> Indispensable — geste de service et gestuelle"
    ]
  },
  {
    tag: "Technique 02",
    icon: "🫙",
    title: "Fat Wash",
    subtitle: "Infuser un corps gras (beurre, lard, huile) dans un alcool, puis filtrer après congélation.",
    points: [
      "<span class='keyword'>Objectif :</span> Apporter rondeur, gourmandise et arômes originaux",
      "<span class='keyword'>Étapes :</span> Infusion chaud → repos 4h → congélation 2h → double filtration",
      "<span class='keyword'>Exemple :</span> Bourbon au beurre noisette, Whisky au bacon",
      "<span class='keyword'>Contraintes :</span> Hygiène stricte, étiquetage obligatoire, conservation limitée"
    ]
  },
  {
    tag: "Technique 03",
    icon: "🌡️",
    title: "Sous Vide",
    subtitle: "Infuser fruits, herbes ou épices dans un alcool à basse température sous vide.",
    points: [
      "<span class='keyword'>Avantage :</span> 1h sous vide = 2 mois de macération classique",
      "<span class='keyword'>Exemple :</span> Vodka framboise — 250g framboises + 70cl vodka à 60°C",
      "<span class='keyword'>Résultat :</span> Arômes conservés, régularité garantie",
      "<span class='keyword'>Limites :</span> Matériel coûteux, impact écologique"
    ]
  },
  {
    tag: "Technique 04",
    icon: "🥛",
    title: "Clarification",
    subtitle: "Obtenir un cocktail limpide par coagulation au lait (Milk Wash) ou à la gélatine.",
    points: [
      "<span class='keyword'>Principe :</span> Retirer particules en suspension (protéines, tanins, pulpe)",
      "<span class='keyword'>Milk Wash :</span> Cocktail + lait chaud → caillage → filtration lente",
      "<span class='keyword'>Exemple :</span> Milk Punch — Rhum ambré + Cognac + citron + lait",
      "<span class='keyword'>Résultat :</span> Liquide soyeux, doux en bouche, visuellement limpide"
    ]
  },
  {
    tag: "Technique 05",
    icon: "🪣",
    title: "Vieillissement en fût",
    subtitle: "Laisser reposer un cocktail dans un fût de chêne pour modifier son profil aromatique.",
    points: [
      "<span class='keyword'>Conditions :</span> Fût de chêne min. 3L, cocktail ≥ 40° (2/3 alcool)",
      "<span class='keyword'>Durée :</span> 3 mois à 1 an",
      "<span class='keyword'>Effets :</span> Notes boisées, vanillées, arômes arrondis",
      "<span class='keyword'>⚠ Interdit :</span> Sucre ou bitters concentrés dans le fût"
    ]
  }
];

let current = 0;
let isFlipped = false;

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    nav.appendChild(d);
  });
}

function renderCard(animClass) {
  const c = cards[current];
  isFlipped = false;
  const card = document.getElementById('card');
  card.classList.remove('flipped', 'anim-right', 'anim-left');

  document.getElementById('tag').textContent = c.tag;
  document.getElementById('title').textContent = c.title;
  document.getElementById('subtitle').textContent = c.subtitle;
  document.getElementById('icon').textContent = c.icon;

  const ul = document.getElementById('points');
  ul.innerHTML = c.points.map(p => `<li>${p}</li>`).join('');

  document.getElementById('cur').textContent = current + 1;
  document.getElementById('total').textContent = cards.length;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === cards.length - 1;
  document.getElementById('nextBtn').textContent = current === cards.length - 1 ? '✓ Terminé' : 'Suivant →';

  buildNav();

  if (animClass) {
    void card.offsetWidth;
    card.classList.add(animClass);
    setTimeout(() => card.classList.remove(animClass), 400);
  }
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= cards.length) return;
  current = next;
  renderCard(dir > 0 ? 'anim-right' : 'anim-left');
}

function goTo(i) {
  const dir = i > current ? 1 : -1;
  current = i;
  renderCard(dir > 0 ? 'anim-right' : 'anim-left');
}

renderCard();
</script>
</body>
</html>
